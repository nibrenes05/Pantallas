<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="CSS/estilo.css">
     <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="contenedor">

    <div class="logo">
        <img src="image/logo.png" alt="ByteShop">
    </div>

    <div class="form-login">

        <div class="icono-usuario">
            <img src="image/usuario.png" alt="Usuario">
        </div>

        <h3>Log in ByteShop</h3>

        <form name="registro" action="" method="post">

            <label for="usuario">Username</label>
            <input class="controles" type="text" name="usuario"
                placeholder="Enter your username" required>

         <label for="password">Password</label>

<div class="contenedor-password">
    <input class="controles"
           type="password"
           id="password"
           name="password"
           placeholder="Enter your password"
           required>

    <i class="bi bi-eye-fill ojo"
       id="ojo"
       onclick="mostrarPassword()"></i>
</div>

            <div class="opciones">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">Forgot password?</a>
            </div>

            <button class="boton" type="submit" name="ingresar">
                Login
            </button>

        </form>

    </div>

</div>
<script src="JS/login.js"></script>
</body>
</html>
